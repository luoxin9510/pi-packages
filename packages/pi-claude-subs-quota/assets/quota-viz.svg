<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#010409"/>
      <stop offset="1" stop-color="#05080d"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#238636"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="barAmber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9e6a03"/>
      <stop offset="1" stop-color="#d29922"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3fb950"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- Terminal window -->
  <rect x="40" y="40" width="1120" height="640" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- Traffic lights -->
  <circle cx="74" cy="74" r="7" fill="#ff5f56"/>
  <circle cx="98" cy="74" r="7" fill="#ffbd2e"/>
  <circle cx="122" cy="74" r="7" fill="#27c93f"/>

  <!-- Title -->
  <text x="600" y="81" font-size="22" font-weight="700" fill="#e6edf3" text-anchor="middle">📊 pi-subs-quota</text>

  <!-- Tagline -->
  <text x="600" y="128" font-size="17" fill="#8b949e" text-anchor="middle">know before you're throttled — <tspan fill="#c9d1d9" font-style="italic">zero extra API calls</tspan></text>

  <!-- ═══════════ LEFT PANEL: API headers ═══════════ -->
  <rect x="68" y="152" width="490" height="290" rx="11" fill="#0d1117" stroke="#30363d" stroke-width="1.2"/>

  <!-- Panel label -->
  <rect x="68" y="152" width="490" height="36" rx="11" fill="#161b22"/>
  <rect x="68" y="170" width="490" height="18" fill="#161b22"/>
  <text x="88" y="176" font-size="13" fill="#8b949e">every Anthropic API response carries:</text>

  <!-- Header lines -->
  <text x="88" y="216" font-size="13.5" fill="#6e7681">HTTP/2 200</text>
  <text x="88" y="242" font-size="13.5" fill="#6e7681">request-id: req_01...</text>

  <!-- Highlighted headers -->
  <rect x="80" y="253" width="466" height="24" rx="4" fill="#0f2620"/>
  <text x="88" y="270" font-size="13.5">
    <tspan fill="#8b949e">anthropic-ratelimit-unified-</tspan><tspan fill="#56d364" font-weight="700">5h-utilization</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#e6edf3" font-weight="700">0.14</tspan>
  </text>

  <rect x="80" y="279" width="466" height="24" rx="4" fill="#0f2620"/>
  <text x="88" y="296" font-size="13.5">
    <tspan fill="#8b949e">anthropic-ratelimit-unified-</tspan><tspan fill="#56d364" font-weight="700">7d-utilization</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#e6edf3" font-weight="700">0.06</tspan>
  </text>

  <rect x="80" y="305" width="466" height="24" rx="4" fill="#111d24"/>
  <text x="88" y="322" font-size="13.5">
    <tspan fill="#8b949e">anthropic-ratelimit-unified-</tspan><tspan fill="#f0883e">5h-reset</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#e6edf3">1781764800</tspan>
  </text>

  <rect x="80" y="331" width="466" height="24" rx="4" fill="#111d24"/>
  <text x="88" y="348" font-size="13.5">
    <tspan fill="#8b949e">anthropic-ratelimit-unified-</tspan><tspan fill="#f0883e">7d-reset</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#e6edf3">1782237600</tspan>
  </text>

  <text x="88" y="382" font-size="12" fill="#6e7681">anthropic-ratelimit-unified-5h-status: <tspan fill="#3fb950">allowed</tspan></text>
  <text x="88" y="404" font-size="12" fill="#6e7681">...representative-claim: <tspan fill="#e6edf3">five_hour</tspan></text>

  <!-- Label under left panel -->
  <text x="313" y="462" font-size="13" fill="#6e7681" text-anchor="middle">already in every response · no extra cost</text>

  <!-- ═══════════ ARROW ═══════════ -->
  <line x1="566" y1="297" x2="622" y2="297" stroke="#3fb950" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="594" y="286" font-size="11" fill="#3fb950" text-anchor="middle">intercept</text>

  <!-- ═══════════ RIGHT PANEL: pi widget ═══════════ -->
  <rect x="634" y="152" width="494" height="290" rx="11" fill="#0d1117" stroke="#30363d" stroke-width="1.2"/>

  <!-- Fake editor area -->
  <rect x="634" y="152" width="494" height="36" rx="11" fill="#161b22"/>
  <rect x="634" y="170" width="494" height="18" fill="#161b22"/>
  <text x="654" y="176" font-size="13" fill="#8b949e">pi editor — your conversation</text>

  <text x="654" y="214" font-size="13.5" fill="#6e7681">you: help me refactor auth.ts</text>
  <text x="654" y="236" font-size="13.5" fill="#6e7681">pi: here's the plan...</text>

  <!-- Editor box -->
  <rect x="644" y="252" width="474" height="34" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="658" y="274" font-size="13.5" fill="#6e7681">▎</text>

  <!-- Widget row (the key feature) -->
  <rect x="644" y="290" width="474" height="30" rx="0" fill="#0f1a14" stroke="#238636" stroke-width="1.5"/>
  <text x="654" y="310" font-size="13.5" fill="#56d364">🟢 5h:14% ↺2h30m</text>
  <text x="812" y="310" font-size="13.5" fill="#56d364">  🟢 7d:6% ↺4d12h</text>
  <text x="1030" y="310" font-size="13.5" fill="#8b949e">  ⏰5h</text>

  <!-- Footer row -->
  <rect x="644" y="320" width="474" height="20" rx="0" fill="#161b22" stroke="#21262d" stroke-width="0.8"/>
  <text x="658" y="334" font-size="11" fill="#484f58">pi v0.79  ·  claude-opus-4  ·  ctx 12%</text>

  <!-- Widget callout -->
  <text x="881" y="362" font-size="12" fill="#3fb950" text-anchor="middle">↑ green row = setWidget, appears below editor</text>

  <!-- /quota panel -->
  <rect x="644" y="378" width="474" height="50" rx="6" fill="#111d24" stroke="#1f3a4a"/>
  <text x="658" y="398" font-size="13" fill="#8b949e">$ <tspan fill="#58a6ff">/quota</tspan>  <tspan fill="#6e7681">— detailed panel ↓</tspan></text>
  <text x="658" y="418" font-size="12.5" fill="#3fb950">╭─ Claude Quota ────────────────────────╮</text>

  <!-- Label under right panel -->
  <text x="881" y="460" font-size="13" fill="#6e7681" text-anchor="middle">← no powerline needed, works out of the box</text>

  <!-- ═══════════ /quota DETAIL PANEL ═══════════ -->
  <rect x="68" y="476" width="1064" height="148" rx="11" fill="#0d1117" stroke="#1f6feb" stroke-width="1.2"/>

  <text x="88" y="502" font-size="13.5" fill="#3fb950">╭─ Claude Subscription Quota ─────────────────────────────────────────────────────────────╮</text>

  <!-- 5h bar -->
  <text x="96" y="526" font-size="13.5" fill="#c9d1d9">│  5h window </text>
  <text x="198" y="526" font-size="13.5" fill="#56d364">🟢 </text>
  <!-- progress bar bg -->
  <rect x="222" y="514" width="200" height="14" rx="3" fill="#21262d"/>
  <!-- progress bar fill (14%) -->
  <rect x="222" y="514" width="28" height="14" rx="3" fill="url(#barGreen)"/>
  <text x="432" y="526" font-size="13.5" fill="#e6edf3" font-weight="700">  14%</text>
  <text x="492" y="526" font-size="13.5" fill="#6e7681">  ↺ resets in 2h30m</text>
  <text x="880" y="526" font-size="13.5" fill="#3fb950">│</text>

  <!-- 7d bar -->
  <text x="96" y="550" font-size="13.5" fill="#c9d1d9">│  7d window </text>
  <text x="198" y="550" font-size="13.5" fill="#56d364">🟢 </text>
  <rect x="222" y="538" width="200" height="14" rx="3" fill="#21262d"/>
  <rect x="222" y="538" width="12" height="14" rx="3" fill="url(#barGreen)"/>
  <text x="432" y="550" font-size="13.5" fill="#e6edf3" font-weight="700">   6%</text>
  <text x="492" y="550" font-size="13.5" fill="#6e7681">  ↺ resets in 4d12h</text>
  <text x="880" y="550" font-size="13.5" fill="#3fb950">│</text>

  <text x="96" y="574" font-size="13.5" fill="#6e7681">│  Active limit: <tspan fill="#f0883e">5-hour window</tspan>    Updated: 14:32:01</text>
  <text x="880" y="574" font-size="13.5" fill="#3fb950">│</text>

  <text x="88" y="598" font-size="13.5" fill="#3fb950">╰──────────────────────────────────────────────────────────────────────────────────────────╯</text>

  <!-- ═══════════ Bottom tagline ═══════════ -->
  <text x="600" y="648" font-size="27" font-weight="700" fill="#58a6ff" text-anchor="middle" font-style="italic">"know before you're throttled"</text>

  <text x="600" y="678" font-size="14" fill="#6e7681" text-anchor="middle">works for Claude subscription <tspan fill="#484f58">·</tspan> and regular API keys <tspan fill="#484f58">·</tspan> independent of powerline</text>
</svg>
