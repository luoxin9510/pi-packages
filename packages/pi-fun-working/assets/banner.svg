<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#010409"/>
      <stop offset="1" stop-color="#05080d"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.00" stop-color="#ff6384"/>
      <stop offset="0.20" stop-color="#ff9f40"/>
      <stop offset="0.40" stop-color="#ffcd56"/>
      <stop offset="0.60" stop-color="#4bde80"/>
      <stop offset="0.80" stop-color="#36c8eb"/>
      <stop offset="1.00" stop-color="#b17aff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="820" fill="url(#bg)"/>

  <!-- terminal window -->
  <rect x="40" y="40" width="1120" height="740" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="74" cy="74" r="7" fill="#ff5f56"/>
  <circle cx="98" cy="74" r="7" fill="#ffbd2e"/>
  <circle cx="122" cy="74" r="7" fill="#27c93f"/>
  <text x="600" y="81" font-size="22" font-weight="700" fill="#e6edf3" text-anchor="middle">🎉 fun-working</text>

  <!-- subtitle -->
  <text x="600" y="124" font-size="18" fill="#8b949e" text-anchor="middle">Your agent works hard — <tspan fill="#c9d1d9" font-style="italic">let it have fun doing it.</tspan></text>

  <!-- ===== live working line demo ===== -->
  <rect x="80" y="148" width="1040" height="58" rx="11" fill="#161b22" stroke="#30363d"/>
  <text x="104" y="184" font-size="24" fill="#ffb450">⠹</text>
  <text x="134" y="184" font-size="23" font-weight="700" fill="url(#rainbow)">Moonwalking through the code…</text>
  <text x="1096" y="184" font-size="14" fill="#6e7681" text-anchor="end">live working line · themed · animated color</text>

  <!-- ===== EVERY HOOK band ===== -->
  <rect x="80" y="228" width="430" height="30" rx="15" fill="#56d364" fill-opacity="0.13"/>
  <text x="100" y="248" font-size="16" font-weight="700" fill="#56d364" letter-spacing="1">EVERY HOOK GETS ITS OWN MEME</text>

  <!-- meme rows: colored channel dot + message + faint hook tag (2 columns) -->
  <!-- left column -->
  <circle cx="92" cy="288" r="5" fill="#4bde80"/>
  <text x="108" y="294" font-size="18" fill="#4bde80">GOOOAL! bash ⚽</text>
  <text x="500" y="294" font-size="13" fill="#6e7681" text-anchor="end">tool pass</text>

  <circle cx="92" cy="326" r="5" fill="#ff6384"/>
  <text x="108" y="332" font-size="18" fill="#ff6384">edit — Nat 1! 🎲</text>
  <text x="500" y="332" font-size="13" fill="#6e7681" text-anchor="end">tool fail · toast</text>

  <circle cx="92" cy="364" r="5" fill="#ffcd56"/>
  <text x="108" y="370" font-size="18" fill="#ffcd56">Level up! Turn 3 🆙</text>
  <text x="500" y="370" font-size="13" fill="#6e7681" text-anchor="end">turn end</text>

  <circle cx="92" cy="402" r="5" fill="#78ffd6"/>
  <text x="108" y="408" font-size="18" fill="#78ffd6">Channeling Thu'um for grep…</text>
  <text x="500" y="408" font-size="13" fill="#6e7681" text-anchor="end">tool start</text>

  <!-- right column -->
  <circle cx="612" cy="288" r="5" fill="#36c8eb"/>
  <text x="628" y="294" font-size="18" fill="#36c8eb">It's coming home 🏆 (842ms)</text>
  <text x="1096" y="294" font-size="13" fill="#6e7681" text-anchor="end">agent done</text>

  <circle cx="612" cy="326" r="5" fill="#b17aff"/>
  <text x="628" y="332" font-size="18" fill="#b17aff">claude-opus, I choose you! ⚡</text>
  <text x="1096" y="332" font-size="13" fill="#6e7681" text-anchor="end">model select</text>

  <circle cx="612" cy="364" r="5" fill="#ff7ade"/>
  <text x="628" y="370" font-size="18" fill="#ff7ade">Rise, Tarnished ⚔️</text>
  <text x="1096" y="370" font-size="13" fill="#6e7681" text-anchor="end">session start</text>

  <circle cx="612" cy="402" r="5" fill="#ffb450"/>
  <text x="628" y="408" font-size="18" fill="#ffb450">Hacking the mainframe 💻</text>
  <text x="1096" y="408" font-size="13" fill="#6e7681" text-anchor="end">user bash</text>

  <!-- ===== feature badges ===== -->
  <g font-size="15" font-weight="700">
    <rect x="80"  y="438" width="150" height="34" rx="17" fill="#161b22" stroke="#30363d"/>
    <text x="155" y="461" fill="#c9d1d9" text-anchor="middle">🪝 15 hooks</text>
    <rect x="242" y="438" width="196" height="34" rx="17" fill="#161b22" stroke="#30363d"/>
    <text x="340" y="461" fill="#c9d1d9" text-anchor="middle">🎲 per-hook chance</text>
    <rect x="450" y="438" width="192" height="34" rx="17" fill="#161b22" stroke="#30363d"/>
    <text x="546" y="461" fill="#c9d1d9" text-anchor="middle">🌈 3 color modes</text>
    <rect x="654" y="438" width="150" height="34" rx="17" fill="#161b22" stroke="#30363d"/>
    <text x="729" y="461" fill="#c9d1d9" text-anchor="middle">🎭 18 themes</text>
    <rect x="816" y="438" width="196" height="34" rx="17" fill="#161b22" stroke="#30363d"/>
    <text x="914" y="461" fill="#c9d1d9" text-anchor="middle">🧩 edit, don't fork</text>
    <rect x="1024" y="438" width="96" height="34" rx="17" fill="#161b22" stroke="#30363d"/>
    <text x="1072" y="461" fill="#c9d1d9" text-anchor="middle">🪶 0 deps</text>
  </g>

  <!-- ===== themes ribbon (3 lines x 6, centered) ===== -->
  <rect x="80" y="498" width="180" height="30" rx="15" fill="#b17aff" fill-opacity="0.13"/>
  <text x="100" y="518" font-size="16" font-weight="700" fill="#b17aff" letter-spacing="1">18 THEMES</text>
  <g font-size="16" fill="#c9d1d9" text-anchor="middle">
    <text x="600" y="552">🕺 MJ · ⚽ Ronaldo · ☢️ Fallout · 🐉 Elder Scrolls · ✨ Star Wars · 💍 LOTR</text>
    <text x="600" y="580">⚡ Pokémon · ⛏️ Minecraft · 🔥 Dark Souls · ⚔️ Elden Ring · 🚗 GTA · 🪓 God of War</text>
    <text x="600" y="608">🌃 Cyberpunk · 🐺 Witcher · 🏆 World Cup · 🎲 BG3 · 📈 internet · 🤖 AI agent</text>
  </g>

  <!-- ===== config: three files ===== -->
  <rect x="80" y="630" width="1040" height="52" rx="11" fill="#161b22" stroke="#30363d"/>
  <text x="600" y="662" font-size="16" text-anchor="middle" fill="#8b949e">⚙️ Edit, don't fork —  <tspan fill="#79c0ff" font-weight="700">messages.ts</tspan> phrases  ·  <tspan fill="#79c0ff" font-weight="700">events.ts</tspan> per-hook memes  ·  <tspan fill="#79c0ff" font-weight="700">settings.ts</tspan> colors &amp; chance</text>

  <!-- hero tagline -->
  <text x="600" y="718" font-size="27" font-weight="700" fill="#58a6ff" text-anchor="middle" font-style="italic">themed, randomly-colored memes for every pi hook</text>

  <!-- footnote -->
  <text x="600" y="754" font-size="14.5" fill="#6e7681" text-anchor="middle">💡 Display only — zero behavior change.  Roll the dice with  <tspan fill="#56d364">chance × chanceMultiplier</tspan>,  or silence it all with one switch.</text>
</svg>
