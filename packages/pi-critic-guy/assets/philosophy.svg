<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#010409"/>
      <stop offset="1" stop-color="#05080d"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3fb950"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- terminal window -->
  <rect x="40" y="40" width="1120" height="640" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="74" cy="74" r="7" fill="#ff5f56"/>
  <circle cx="98" cy="74" r="7" fill="#ffbd2e"/>
  <circle cx="122" cy="74" r="7" fill="#27c93f"/>
  <text x="600" y="81" font-size="22" font-weight="700" fill="#e6edf3" text-anchor="middle">🧐 critic-guy</text>

  <!-- supporting line -->
  <text x="600" y="150" font-size="18" fill="#8b949e" text-anchor="middle">You decide <tspan fill="#c9d1d9" font-style="italic">that</tspan> you want a review — the model decides <tspan fill="#c9d1d9" font-style="italic">what</tspan> and <tspan fill="#c9d1d9" font-style="italic">how</tspan>.</text>

  <!-- ===== FREEDOM band ===== -->
  <rect x="80" y="180" width="372" height="30" rx="15" fill="#3fb950" fill-opacity="0.13"/>
  <text x="100" y="200" font-size="16" font-weight="700" fill="#3fb950" letter-spacing="1">FREEDOM — handed to the model</text>

  <!-- flow: you -> "critic" -> MODEL -->
  <rect x="92" y="240" width="104" height="48" rx="9" fill="#161b22" stroke="#30363d"/>
  <text x="144" y="270" font-size="19" fill="#c9d1d9" text-anchor="middle">you</text>

  <line x1="200" y1="264" x2="252" y2="264" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="258" y="242" width="118" height="44" rx="22" fill="#3fb950" fill-opacity="0.12" stroke="#238636"/>
  <text x="317" y="270" font-size="18" fill="#3fb950" text-anchor="middle">"critic"</text>

  <line x1="380" y1="264" x2="452" y2="264" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowG)"/>

  <rect x="460" y="236" width="316" height="56" rx="11" fill="#11261a" stroke="#3fb950" stroke-width="1.5"/>
  <text x="618" y="271" font-size="22" font-weight="700" fill="#56d364" text-anchor="middle">🧠 THE MODEL DECIDES</text>

  <!-- bullets (below the model box) -->
  <text x="470" y="332" font-size="18" fill="#8b949e">🎯 <tspan fill="#c9d1d9">what</tspan> to review</text>
  <text x="470" y="362" font-size="18" fill="#8b949e">🧐 one critic, or <tspan fill="#c9d1d9">🧐🧐🧐 many in parallel</tspan></text>

  <!-- ===== rail divider (a fence) ===== -->
  <line x1="80" y1="392" x2="1120" y2="392" stroke="#9e6a03" stroke-width="2.5"/>
  <line x1="80" y1="400" x2="1120" y2="400" stroke="#9e6a03" stroke-width="2.5"/>

  <!-- ===== HARD RAILS band ===== -->
  <g transform="translate(98,434)">
    <path d="M4,9 v-3 a6,6 0 0 1 12,0 v3" fill="none" stroke="#d29922" stroke-width="2.6"/>
    <rect x="0" y="9" width="20" height="15" rx="2.5" fill="#d29922"/>
    <circle cx="10" cy="15" r="2" fill="#0d1117"/>
    <rect x="9" y="16" width="2" height="4" fill="#0d1117"/>
  </g>
  <rect x="130" y="436" width="356" height="30" rx="15" fill="#d29922" fill-opacity="0.13"/>
  <text x="148" y="456" font-size="16" font-weight="700" fill="#d29922" letter-spacing="1">HARD RAILS — enforced in code</text>

  <rect x="80" y="482" width="1040" height="72" rx="11" fill="#161b22" stroke="#9e6a03" stroke-width="1.5"/>
  <text x="600" y="525" font-size="18" fill="#e6edf3" text-anchor="middle">👀 <tspan fill="#f0883e" font-weight="700">read-only</tspan>  ·  ✈️ <tspan fill="#f0883e" font-weight="700">--offline -ne</tspan>  ·  📦 <tspan fill="#f0883e" font-weight="700">isolated</tspan>  ·  🤫 <tspan fill="#f0883e" font-weight="700">no secrets</tspan></text>

  <!-- hero tagline -->
  <text x="600" y="600" font-size="29" font-weight="700" fill="#58a6ff" text-anchor="middle" font-style="italic">"freedom in the middle, rails at the edge"</text>

  <!-- footnote: default vs steerable -->
  <text x="600" y="648" font-size="14.5" fill="#6e7681" text-anchor="middle">💡 Default shown — your prompt can steer focus, scope, and model:  <tspan fill="#56d364">critic using claude</tspan>  ·  <tspan fill="#56d364">critic model=gpt-4.1</tspan></text>
</svg>
